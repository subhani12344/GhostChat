databases:
  - name: ghostchat-db
      plan: free

      services:
        - type: web
            name: strangerlink-backend
                env: node
                    rootDir: backend
                        buildCommand: npm install
                            startCommand: npm start
                                envVars:
                                      - key: PORT
                                              value: 4000
                                                    - key: DATABASE_URL
                                                            fromDatabase:
                                                                      name: ghostchat-db
                                                                                property: connectionString
                                                                                    plan: free
